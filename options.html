<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>AI Usage Tracker - 設定</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 40px;
      width: 520px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: #c4b5fd;
    }

    input[type="url"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    input[type="url"]:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
    }

    input[type="url"]::placeholder {
      color: #6b7280;
    }

    .button-group {
      display: flex;
      gap: 12px;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #c4b5fd;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .status.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
    }

    .status.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
    }

    .status.info {
      display: block;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #60a5fa;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .services-list {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .services-list h2 {
      font-size: 1rem;
      font-weight: 500;
      color: #c4b5fd;
      margin-bottom: 12px;
    }

    .service-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      margin-bottom: 6px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      transition: background 0.2s;
    }

    .service-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .service-name {
      font-size: 0.85rem;
      color: #d1d5db;
      flex: 1;
    }

    .service-item.disabled .service-name {
      color: #6b7280;
      text-decoration: line-through;
    }

    /* トグルスイッチ */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: #9ca3af;
      border-radius: 50%;
      transition: transform 0.3s, background 0.3s;
    }

    .toggle input:checked+.toggle-slider {
      background: rgba(124, 58, 237, 0.4);
    }

    .toggle input:checked+.toggle-slider::before {
      transform: translateX(20px);
      background: #a78bfa;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>⚙️ AI Usage Tracker</h1>
    <p class="subtitle">GAS Webhook の接続設定</p>

    <div class="form-group">
      <label for="webhookUrl">GAS Webhook URL</label>
      <input type="url" id="webhookUrl" placeholder="https://script.google.com/macros/s/xxx/exec" />
      <p style="margin-top: 8px; font-size: 0.8rem;">
        <a href="manual.html" target="_blank" style="color: #93c5fd; text-decoration: none;">📖 GAS Webhook URL
          の取得方法はこちら</a>
      </p>
    </div>

    <div class="form-group">
      <label for="authToken">GAS 認証用トークン</label>
      <input type="text" id="authToken" placeholder="YOUR_SECRET_TOKEN" />
      <p style="margin-top: 8px; font-size: 0.8rem; color: #9ca3af;">
        GASスクリプト内で設定した AUTH_TOKEN と同じ値を入力してください。
      </p>
    </div>

    <div class="button-group">
      <button id="saveBtn" class="btn-primary">💾 保存して接続テスト</button>
      <button id="testBtn" class="btn-secondary">🔗 接続テスト</button>
    </div>

    <div id="status" class="status"></div>

    <div class="services-list">
      <h2>📡 監視対象サービス</h2>
      <div id="servicesList"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="options.js"></script>
</body>

</html>
